<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#3b82f6" />
    <meta
      name="description"
      content="AI-powered food tracking platform with Telegram WebApp integration"
    />
    <meta name="color-scheme" content="light dark" />

    <!-- Apple iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Calora" />

    <!-- Android PWA Support -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Calora - Food Tracker" />

    <!-- Microsoft Windows Support -->
    <meta name="msapplication-TileColor" content="#3b82f6" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="canonical" href="https://calora.gignite.uz" />

    <!-- Preconnect to API -->
    <link rel="preconnect" href="https://calora-api.gignite.uz" />
    <link rel="dns-prefetch" href="https://calora-api.gignite.uz" />

    <!-- Preload critical resources -->
    <link rel="preload" as="style" href="/src/index.css" />

    <title>Calora - Food Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>
      <p>Bu ilovani ishlatish uchun JavaScript yoqilgan bo'lishi kerak.</p>
    </noscript>
  </body>
</html>
